# Local Airflow orchestration configuration for Phase 3.
# Copy to airflow_config.yaml for machine-specific settings if needed.

project:
  root_path: "."
  python_executable: "python"

pipeline:
  name: "energy_batch_lakehouse_pipeline"
  schedule: null
  retries: 1

sql_server:
  driver: "ODBC Driver 18 for SQL Server"
  server: "localhost"
  database: "EnergyWarehouse"
  trusted_connection: true
  username: ""
  password: ""
  encrypt: true
  trust_server_certificate: true

data_lake:
  root: "./data_lake"
  bronze: "./data_lake/bronze"
  silver: "./data_lake/silver"
  gold: "./data_lake/gold"
